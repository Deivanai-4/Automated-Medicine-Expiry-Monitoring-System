<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sales Analytics | MediTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>

*{
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:#f1f5f9;
color:#334155;
}

/* NAVBAR */

.navbar{
background:#1e293b;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
}

.navbar a{
color:#cbd5e1;
text-decoration:none;
margin-left:20px;
font-weight:500;
transition:0.3s;
}

.navbar a:hover{
color:#3b82f6;
}

/* PAGE */

.container{
max-width:1200px;
margin:auto;
padding:40px 5%;
}

.page-title{
margin-bottom:30px;
}

/* STATISTICS CARDS */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.stat-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.05);
}

.stat-card p{
margin:0;
color:#64748b;
font-size:14px;
}

.stat-card h2{
margin-top:8px;
color:#10b981;
}

/* TABLE */

.table-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.05);
margin-bottom:40px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8fafc;
padding:14px;
text-align:left;
font-size:13px;
border-bottom:2px solid #e2e8f0;
}

td{
padding:14px;
border-bottom:1px solid #f1f5f9;
}

/* CHARTS */

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.chart-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.05);
}

canvas{
margin-top:10px;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
color:#94a3b8;
font-size:13px;
}

</style>
</head>

<body>

<div class="navbar">

<h3>MediTrack</h3>

<div>
<a href="/dashboard">Home</a>
<a href="/add">Inventory</a>
<a href="/all_medicines">Overview</a>
<a href="/sales">Sales</a>
<a href="/expired">Expired</a>
<a href="/sales-prediction" style="color:#3b82f6;">Prediction</a>
<a href="/logout" style="color:#f87171;">Logout</a>
</div>

</div>

<div class="container">
    <div class="glass-card">
        <h2>Sales Analytics Dashboard</h2>
        <form method="GET" action="/sales-prediction" style="margin: 20px 0; display:flex; gap:10px;">
            <input type="text" name="search" placeholder="Search medicine..." style="flex:1; padding:10px; border-radius:8px; border:none;">
            <button type="submit" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:8px;">Analyze</button>
        </form>

        <div class="stats-grid">
            <div class="stat-box"><h3>{{ total_sales }}</h3><p>Units Sold</p></div>
            <div class="stat-box"><canvas id="demandChart"></canvas></div>
            <div class="stat-box"><canvas id="pieChart"></canvas></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
    const medNames = JSON.parse('{{ med_names | safe }}');
    const medSales = JSON.parse('{{ med_sales | safe }}');

    new Chart(document.getElementById("demandChart"), {
        type: 'bar',
        data: {
            labels: medNames,
            datasets: [{ label: 'Demand', data: medSales, backgroundColor: '#3b82f6', borderRadius: 5 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: 'white' } } } }
    });
</script>

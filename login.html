<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-image: url("/static/bg.jpg");
            background-size: cover;
            background-position: center;
        }
        .box {
            width: 320px;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            margin: 120px auto;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            background: #2c7be5;
            color: white;
            padding: 8px 20px;
            border: none;
            cursor: pointer;
        }
        .error { color: red; }
    </style>
</head>
<body>

<div class="box">
    <h2>Medical System Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- ✅ MOBILE IMPORTANT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-image: url("/static/bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .box {
            width: 320px;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            margin: 120px auto;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            background: #2c7be5;
            color: white;
            padding: 8px 20px;
            border: none;
            cursor: pointer;
        }

        .error { color: red; }

        /* 🔥 PERFECT MOBILE CENTER FIX */
        @media (max-width: 768px) {

            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;   /* 🔥 full screen center */
            }

            .box {
                width: 90%;
                max-width: 360px;
                margin: 0;        /* ❌ remove old margin */
                padding: 25px;
            }

            input {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }

            button {
                width: 100%;
                padding: 12px;
                margin-top: 10px;
                font-size: 14px;
            }

            h2 {
                font-size: 20px;
            }
        }

    </style>
</head>

<body>

<div class="box">
    <h2>Medical System Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Management | MediTrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #f8fafc;
    color: #334155;
}

/* ✅ NAVBAR */
.navbar { 
    background: #021027; 
    padding: 1rem 5%; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    color: white;
    position: relative; /* 🔥 */
}

.nav-links {
    display: flex;
    gap: 10px;
    margin-left: auto;
}

.nav-links a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    padding: 6px 10px;
}

.nav-links a:hover,
.nav-links a.active {
    color: #3b82f6;
}

.logout {
    color: #f87171;
}

/* 🔥 MENU BUTTON */
.menu-toggle {
    display: none;
    font-size: 24px;
    cursor: pointer;
    color: white;
}

/* 📱 MOBILE DROPDOWN */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #021027;

        flex-direction: column;
        align-items: center;
        padding: 15px 0;
    }

    .nav-links a {
        width: 90%;
        text-align: center;
        padding: 12px;
    }

    .nav-links.active {
        display: flex;
    }
}

/* REST SAME */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 5%;
}

.card {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
    margin-bottom: 25px;
}

h2 {
    margin-bottom: 15px;
    color: #1e293b;
    border-left: 4px solid #10b981;
    padding-left: 10px;
}

.sales-form {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    align-items: end;
}

@media (max-width: 768px) {
    .sales-form {
        grid-template-columns: 1fr;
    }
}

.sales-form div {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

label {
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
}

input, select {
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 14px;
}

.btn-save {
    background-color: #10b981;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.btn-save:hover {
    background-color: #059669;
}

.clear-btn {
    background: #ef4444;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

.filter-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
}

.filter-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.table-container {
    width: 100%;
    overflow-x: auto;
}

.logo-box {
    display: flex;
    align-items: center;
}

.logo-img {
    width: 60px;
    height: 55px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th {
    background-color: #f8fafc;
    padding: 14px;
}

td {
    padding: 14px;
    border-bottom: 1px solid #f1f5f9;
}

.status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.Sold { background: #dcfce7; color: #15803d; }
.Returned { background: #fef3c7; color: #b45309; }
.Damaged { background: #fee2e2; color: #b91c1c; }

</style>
</head>

<body>

<div class="navbar">

<div class="logo-box">
<img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">
</div>

<!-- ☰ MENU -->
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="navLinks">
<a href="/dashboard">Home</a>
<a href="/add">Inventory</a>
<a href="/all_medicines">Overview</a>
<a href="/sales" class="active">Sales</a>
<a href="/expired">Expired</a>
<a href="/prediction">Prediction</a>
<a href="/notifications">🔔</a>
<a href="/logout" class="logout">Logout</a>
</div>

</div>

<div class="container">

<h2>New Sale Transaction</h2>
<div class="card">
<form action="/save-sales" method="POST" class="sales-form">

<div>
<label>Medicine Name</label>
<input type="text" name="medicine_name" required>
</div>

<div>
<label>Batch No</label>
<input type="text" name="batch_no" required>
</div>

<div>
<label>Expiry Date</label>
<input type="date" name="expiry_date" required>
</div>

<div>
<label>Quantity</label>
<input type="number" name="quantity" min="1" required>
</div>

<div>
<label>Status</label>
<select name="status">
<option value="Sold">Sold</option>
<option value="Returned">Returned</option>
<option value="Damaged">Damaged</option>
</select>
</div>

<button type="submit" class="btn-save">Add Sale</button>

</form>
</div>

<div class="filter-section">
<h2>Sales History</h2>

<form method="GET" action="/sales" class="filter-form">
<input type="date" name="filter_date">
<button type="submit">Filter</button>
</form>

<form action="/clear-sales" method="POST">
<button type="submit" class="clear-btn"
onclick="return confirm('Are you sure to clear all sales?')">
Clear
</button>
</form>

</div>

<div class="card">
<div class="table-container">
<table>
<thead>
<tr>
<th>Medicine Name</th>
<th>Batch</th>
<th>Expiry</th>
<th>Qty</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for row in sales %}
<tr>
<td><strong>{{ row.medicine_name }}</strong></td>
<td>{{ row.batch_no }}</td>
<td>{{ row.expiry_date }}</td>
<td>{{ row.quantity }}</td>
<td><span class="status-badge {{ row.status }}">{{ row.status }}</span></td>
</tr>
{% endfor %}
</tbody>

</table>
</div>
</div>

</div>

<script>
function toggleMenu() {
document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>

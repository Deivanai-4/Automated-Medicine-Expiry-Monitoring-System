<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediTrack | Stock Demand Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #f1f5f9;
    color: #1e293b;
}

/* NAVBAR */
.navbar {
    background: #010916;
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    position: relative;
    z-index: 1000;
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: #cbd5e1;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
}

.active-link {
    background: #3b82f6;
    padding: 8px 15px;
    border-radius: 6px;
    color: white !important;
}

/* ☰ MENU */
.menu-toggle {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

/* PAGE */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

.glass-card {
    background: white;
    padding: 30px;
    border-radius: 16px;
}

/* SEARCH */
.search-pill {
    display: flex;
    background: white;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #e2e8f0;
    width: 380px;
    margin: 25px 0;
}

.search-pill input {
    border: none;
    flex: 1;
    padding: 10px;
    outline: none;
}

.search-pill button {
    background: #4f46e5;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
}

/* GRAPH */
.chart-container {
    position: relative;
    height: 480px;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    /* 🔥 DROPDOWN FIX */
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 65px;   /* 🔥 BELOW NAVBAR */
        left: 0;
        width: 100%;
        background: #010916;
        padding: 10px 20px;
        z-index: 999;
        border-top: 1px solid #1e293b;
    }

    .nav-links.active {
        display: flex;
    }

    .nav-links a {
        padding: 12px 0;
        margin: 0;
        border-bottom: 1px solid #1e293b;
    }

    /* 🔥 CONTENT PUSH DOWN */
    .nav-links.active ~ .container {
        margin-top: 200px;
    }

    /* GRAPH BIG */
    .chart-container {
        height: 520px;
    }

    canvas {
        width: 100% !important;
        height: 100% !important;
    }

    .search-pill {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="navbar">

    <!-- LOGO -->
    <div>
        <img src="{{ url_for('static', filename='logo.png') }}"
             style="width:65px; height:55px;">
    </div>

    <!-- ☰ -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <!-- LINKS -->
    <div class="nav-links" id="navLinks">
        <a href="/dashboard">Home</a>
        <a href="/add">Add Medicine</a>
        <a href="/all_medicines">All Medicines</a>
        <a href="/sales">Sales</a>
        <a href="/expired">Expired</a>
        <a href="/sales-prediction">Prediction</a>
        <a href="/notifications">🔔</a>
        <a href="/logout" style="color:#f87171;">Logout</a>
    </div>

</div>

<div class="container">
<div class="glass-card">

<h2>Stock Demand Prediction</h2>

<form class="search-pill" action="/prediction" method="GET">
    <input type="text" name="search" placeholder="Search medicine..."
           value="{{ search_query if search_query else '' }}">
    <button type="submit">Predict</button>
</form>

<div class="chart-container">
    <canvas id="predictionChart"></canvas>
</div>

</div>
</div>

<script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

const labels = JSON.parse('{{ med_names | safe }}');
const values = JSON.parse('{{ med_sales | safe }}');
const isSearch = {{ 'true' if search_query else 'false' }};

new Chart(document.getElementById('predictionChart'), {
    type: isSearch ? 'line' : 'bar',
    data: {
        labels: labels,
        datasets: [{
            data: values
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

</body>
</html>

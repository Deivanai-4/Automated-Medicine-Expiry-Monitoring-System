<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack | Stock Demand Prediction</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }

        /* --- MASTER NAV BAR --- */
        .nav {
            background: #040432;
            backdrop-filter: blur(15px);
            padding: 0 5%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #cbd5e1;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav a.active {
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.1);
        }

        /* --- NOTIFICATION BADGE --- */
        .notif-link {
            position: relative;
            font-size: 18px;
        }

        .badge-count {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
            position: absolute;
            top: 2px;
            right: 2px;
            border: 2px solid #040432;
        }

        .logout-btn {
            color: #f87171 !important;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        /* --- PAGE CONTENT --- */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .glass-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            padding-left: 15px;
        }

        .search-pill {
            display: flex;
            background: white;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            max-width: 450px;
            margin: 25px 0;
        }

        .search-pill input {
            border: none;
            flex: 1;
            padding: 10px 15px;
            outline: none;
            font-size: 14px;
        }

        .search-pill button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-pill button:hover { background: #2563eb; }

        .chart-container {
            position: relative;
            height: 500px;
            width: 100%;
            margin-top: 20px;
        }

        /* --- MOBILE VIEW FIX --- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                position: absolute;
                top: 70px; left: 0; width: 100%;
                background: #040432;
                flex-direction: column;
                padding: 10px 0;
                display: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .nav-links.active { display: flex; }
            
            /* Bell icon and links left side fix */
            .nav a { 
                width: fit-content; 
                justify-content: flex-start; 
                padding: 12px 25px; 
                margin-left: 10px;
            }
            .notif-link { width: fit-content !important; margin-bottom: 5px; }

            .search-pill { max-width: 100%; }
            .chart-container { height: 400px; }
        }
    </style>
</head>

<body>

<nav class="nav">
    <a href="/dashboard" style="background:none; padding:0;">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img" alt="Logo">
    </a>

    <div class="nav-links" id="navLinks">
        <a href="/dashboard">Home</a>
        <a href="/add">Add Medicine</a>
        <a href="/all_medicines">All Medicines</a>
        <a href="/sales">Sales</a>
        <a href="/expired">Expired</a>
        <a href="/prediction" class="active">Prediction</a>

        <a href="/notifications" class="notif-link">
            🔔
            {% if notifications and notifications|length > 0 %}
                <span class="badge-count">{{ notifications|length }}</span>
            {% endif %}
        </a>

        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<div class="container">
    <div class="glass-card">
        <h2>Stock Demand Prediction</h2>

        <form class="search-pill" action="/prediction" method="GET">
            <input type="text" name="search" placeholder="Search medicine name..."
                   value="{{ search_query if search_query else '' }}">
            <button type="submit">Predict</button>
        </form>

        <div class="chart-container">
            <canvas id="predictionChart"></canvas>
        </div>
    </div>
</div>

<script>
    function toggleMenu(){
        document.getElementById("navLinks").classList.toggle("active");
    }

    // Chart logic
    const labels = JSON.parse('{{ med_names | safe }}' || '[]');
    const values = JSON.parse('{{ med_sales | safe }}' || '[]');
    const isSearch = {{ 'true' if search_query else 'false' }};

    const ctx = document.getElementById('predictionChart').getContext('2d');
    new Chart(ctx, {
        type: isSearch ? 'line' : 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: isSearch ? 'Demand Trend' : 'Stock Levels',
                data: values,
                backgroundColor: isSearch ? 'rgba(59, 130, 246, 0.2)' : '#3b82f6',
                borderColor: '#3b82f6',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: isSearch }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                x: { grid: { display: false } }
            }
        }
    });
</script>

</body>
</html>
